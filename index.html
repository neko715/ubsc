<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S stage</title>
<style>
  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0; height:100%; width:100%;
    overflow:hidden;
    background:#000;
  }
  .stage-room{
    height:100%; width:100%;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  iframe{
    display:block;
    border:0;
    transform-origin: center center;
  }
  .fs-btn{
    position:absolute;
    bottom:20px; right:20px;
    width:48px; height:48px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.15);
    background: rgba(20,20,20,0.55);
    color:#fff;
    font-size:18px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter: blur(4px);
    transition: background .15s ease, transform .15s ease;
  }
  .fs-btn:hover{
    background: rgba(40,40,40,0.75);
    transform: translateY(-1px);
  }
</style>
</head>
<body>
  <div class="stage-room">
    <iframe
      id="scratchFrame"
      src="https://scratch.mit.edu/projects/1154594991/embed"
      width="485"
      height="402"
      frameborder="0"
      scrolling="no"
      allowtransparency="true"
      allowfullscreen
      tabindex="0"
    ></iframe>
    <button class="fs-btn" id="fsBtn" title="全画面表示の切り替え">⛶</button>
  </div>

<script>
  const NATIVE_W = 485, NATIVE_H = 402;
  const MAX_SCALE = 3.5; // 拡大しすぎてぼやけないようにする上限

  const iframe = document.getElementById('scratchFrame');
  const fsBtn = document.getElementById('fsBtn');

  function applyScale(){
    const scale = Math.min(
      window.innerWidth / NATIVE_W,
      window.innerHeight / NATIVE_H,
      MAX_SCALE
    );
    iframe.style.transform = 'scale(' + scale + ')';
  }

  function focusStage(){
    try { iframe.focus({ preventScroll: true }); } catch (e) { iframe.focus(); }
  }

  window.addEventListener('resize', applyScale);
  document.addEventListener('fullscreenchange', () => { applyScale(); focusStage(); });

  window.addEventListener('load', () => {
    applyScale();
    setTimeout(focusStage, 500);
  });

  // どこをクリックしてもステージへフォーカスを戻す
  document.addEventListener('click', focusStage);
  // キー操作時にもフォーカスを保証
  document.addEventListener('keydown', focusStage, true);

  fsBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      (document.documentElement.requestFullscreen ||
       document.documentElement.webkitRequestFullscreen)?.call(document.documentElement);
    } else {
      (document.exitFullscreen ||
       document.webkitExitFullscreen)?.call(document);
    }
  });
</script>
</body>
</html>
